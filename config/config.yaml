# ===============================================================
# TrendRadar 配置文件 - 2026 程序员 AI 转型决策专用版
# ===============================================================

app:
  timezone: "Asia/Shanghai"
  show_version_update: true

schedule:
  enabled: true
  preset: "morning_evening" # 早晚推送深度决策简报

# 1. 监控源：聚焦高价值信号
platforms:
  enabled: true
  sources:
    - id: "github-trending"
      name: "GitHub 趋势"
    - id: "wallstreetcn-hot"
      name: "华尔街见闻(财经偏向)"
    - id: "cls-hot"
      name: "财联社(政策与算力)"


rss:
  enabled: true
  freshness_filter:
    enabled: true
    max_age_days: 2
  feeds:
    - id: "arxiv-cs-ai"
      name: "arXiv AI 论文"
      url: "https://rss.arxiv.org/rss/cs.AI"
    - id: "latent-space"
      name: "Latent Space (AI 工程范式)"
      url: "https://www.latent.space/feed"
    - id: "the-information"
      name: "The Information (商业变局)"
      url: "https://www.theinformation.com/feed"

# 2. 报告与展示控制
report:
  mode: "current"
  display_mode: "keyword"
  sort_by_position_first: true # 严格按 frequency_words.txt 的优先级排序
  rank_threshold: 10

display:
  region_order:
    - ai_analysis   # 决策逻辑最重要，放在最顶部
    - hotlist
    - rss
  regions:
    hotlist: true
    rss: true
    ai_analysis: true
    new_items: false
    standalone: false

# 3. 推送通道 (请在 GitHub Secrets 配置变量)
notification:
  enabled: true
  channels:
    feishu:
      webhook_url: "" # 留空，GitHub Secrets 名为 FEISHU_WEBHOOK_URL

# 4. AI 模型引擎 (建议使用强推理模型)
ai:
  model: "deepseek-chat" # 或 deepseek/deepseek-chat
  api_key: "sk-00c722bad66c4517954a5a836c99471a"            # 留空，GitHub Secrets 名为 AI_API_KEY
  temperature: 0.7
  max_tokens: 5000

# 5. AI 决策分析核心逻辑
ai_analysis:
  enabled: true
  language: "Chinese"
  mode: "follow_report"
  max_news_for_analysis: 100
  include_rss: true
  include_standalone: false
  include_rank_timeline: true
  # 这里的 prompt 会覆盖系统默认，实现你要求的“决策顾问”角色
  prompt_file: "ai_analysis_prompt.txt" 

# 6. 高级降噪与权重 (内部参数)
advanced:
  weight:
    rank: 0.4
    frequency: 0.5 # 提高频次权重，捕捉跨平台共振信号
    hotness: 0.1
